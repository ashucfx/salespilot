spring:
  application:
    name: SalesPilot

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/salespilot}
    username: ${DB_USERNAME:salespilot}
    password: ${DB_PASSWORD:salespilot123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration,classpath:db/seed}
    baseline-on-migrate: false
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:b29ff7001@smtp-brevo.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true


  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-stacktrace: never
    include-message: always

logging:
  level:
    com.ripplenexus.salespilot: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Sales Pilot API
    description: Enterprise CRM API by Ripple Nexus
    version: 1.0.0

# Application-specific config
salespilot:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-must-be-at-least-256-bits}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}         # 15 minutes
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}    # 7 days
    issuer: SalesPilot

  file-storage:
    provider: ${FILE_STORAGE_PROVIDER:local}
    local:
      upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    s3:
      bucket: ${S3_BUCKET:salespilot}
      region: ${S3_REGION:ap-south-1}
      endpoint: ${S3_ENDPOINT:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}

  email:
    from: ${EMAIL_FROM:ashutosh.shukla@theripplenexus.com}
    from-name: ${EMAIL_FROM_NAME:Sales Pilot}
    provider: ${EMAIL_PROVIDER:brevo}

  rate-limit:
    auth-requests-per-minute: 10
    api-requests-per-minute: 100

  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
