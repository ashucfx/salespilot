services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: salespilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-salespilot}
      POSTGRES_USER: ${DB_USERNAME:-salespilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-salespilot123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-salespilot} -d ${DB_NAME:-salespilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salespilot-network

  # ─────────────────────────────────────────────────────────────
  # Spring Boot Backend
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salespilot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-salespilot}
      DB_USERNAME: ${DB_USERNAME:-salespilot}
      DB_PASSWORD: ${DB_PASSWORD:-salespilot123}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-minimum-256-bit-secret-key-here}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-900000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-resend}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@salespilot.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Sales Pilot}
      FILE_STORAGE_PROVIDER: ${FILE_STORAGE_PROVIDER:-local}
      FILE_UPLOAD_DIR: /app/uploads
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://nginx}
      SERVER_PORT: 8080
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - salespilot-network

  # ─────────────────────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://nginx/api}
    container_name: salespilot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://nginx/api}
      NEXT_PUBLIC_APP_NAME: "Sales Pilot"
    ports:
      - "3000:3000"
    networks:
      - salespilot-network

  # ─────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: salespilot-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - salespilot-network

volumes:
  postgres_data:
    name: salespilot_postgres_data
  uploads_data:
    name: salespilot_uploads

networks:
  salespilot-network:
    name: salespilot-network
    driver: bridge
